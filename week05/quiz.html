<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic HTML and CSS Quiz</title>
    <link rel="stylesheet" href="styles/quiz.css">

</head>

<body>
    <form>
        <h1>Basic HTML and CSS Quiz</h1>

        <label for="q1">1. What Does the acronym stand for?</label>
        <input type="text" id="q1" name="text" required>

        <label for="q2">2. How re id and class attributes selected css?</label>
        <textarea id="q2" name="q2" rows="4" required></textarea>

        <label for="choice">3. Which of the following is a valid css comment?</label>
        <select name="choice" id="choice" required>
            <option value="" selected disabled></option>
            <option value="">/*comments*/</option>
            <option value="">//comments</option>
            <option value="">#comments*\</option>

        </select>

        <label for="q4">4. what is the bottom margin given this declaration?</label>
        <pre><code>margin: 10px 5px 15px;</code></pre>
        <input type="text" id="q4" name="q4" required>

        <button type="submit">Submit Quiz</button>

    </form>

</body>


</html>
