<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact US | White Water Rafting </title>

    <meta name="author" content="Banze Billy">

    <meta name="description" content="You may contact whitewater rafting Company.">

    <link rel="stylesheet" href="styles/contact.css">
</head>

<body>

    <header>

        <div class="logo">
            <img src="images/z-wwr-blue.jpg" alt="Exciting Expeditions Logo">
        </div>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>

    </header>

    <main>

        <div class="contact-hero">

            <h1>White Water Rafting Company</h1>

            <p>123 Main River Street </p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>


        </div>

        <section class="contact-section">
            <div class="map-box">
                <iframe
                  src="https://www.google.com/maps?q=123+Main+River+Street+Kolob+California&output=embed"
                  allowfullscreen="" loading="lazy">
                </iframe>

            </div>

            <div class="contact-form">
                <form action="" method="post">
                    <label for="name">name</label>
                    <input type="text" id="name" name="name" required placeholder="Name">

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required placeholder="Email">

                    <fieldset class="purpose-group">
                        <legend>Message Purpose</legend>

                        <label>
                            <input type="radio" name="purpose" value="general" checked>
                            General Inquiry
                        </label>

                        <label>
                            <input type="radio" name="purpose" value="reservation" checked>
                            Reservation Question
                        </label>

                        <label>
                            <input type="radio" name="purpose" value="suggestion" checked>
                            Website Suggestion
                        </label>
                    </fieldset>
                    <label for="message">Message</label>
                    <textarea name="message" id="message" rows="4"
                      placeholder="Type here"></textarea>
                    </textarea>

                    <label class="subscribe-label">
                        <input type="checkbox" name="subscribe">
                        Please Subscribe me to the monthly newsletter
                    </label>

                    <button type="submit"> Get in Touch</button>

                </form>
            </div>

        </section>

        <section class="employee">

            <h2>We Are here to Serve You</h2>

            <div class="employee-gallery">

                <figure>
                    <img src="images/employee1.png" alt="Employee 1">
                    <figcaption>Employee1</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.png" alt="Employee 2">
                    <figcaption>Employee2</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.png" alt="Employee 3">
                    <figcaption>Employee3</figcaption>
                </figure>

            </div>

        </section>

    </main>

    <footer>

        <p>© 2026 🌍 Exciting Expeditions 🌍 Banze Billy</p>

        <nav class="socialmedia">

            <a href="https://facebook.com">
                <img src="images/facebook.jpg" alt="Facebook icon">
            </a>

            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="LinkedIn icon">
            </a>

            <a href="https://instagram.com">
                <img src="images/instagram.jpg" alt="Instagram icon">
            </a>

        </nav>

    </footer>

</body>

</html>
